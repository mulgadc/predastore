# Test configuration with intentionally invalid bucket names.
# Used by config_test.go to verify bucket name validation.
version = "1.0"
region = "ap-southeast-2"

# Invalid bucket name ([a-z0-9-.])
[[buckets]]
name = "INVALIDNAME"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

# Invalid bucket name < 3 chars
[[buckets]]
name = "hi"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

# Invalid bucket name > 63 chars
[[buckets]]
name = "1111111111111111111111111111111111111111111111111111111111111111"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

# Invalid bucket name contains _ chars
[[buckets]]
name = "invalid_characters"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

# Invalid bucket name contains special chars
[[buckets]]
name = "bad^bucket;'"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

# Invalid bucket must end in a-z0-9
[[buckets]]
name = "badbucket-"
region = "ap-southeast-2"
type = "distributed"
public = false
encryption = ""
account_id = "123456789012"

[[auth]]
access_key_id = "AKIAIOSFODNN7EXAMPLE"
secret_access_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
account_id = "123456789012"
policy = [
  { bucket = "private", actions = ["s3:ListBucket",  "s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListAllMyBuckets"] },
  { bucket = "secure", actions = ["s3:ListBucket", "s3:ListAllMyBuckets", "s3:GetObject"] },
  { bucket = "predastore", actions = ["s3:ListBucket",  "s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListAllMyBuckets"] },
]
