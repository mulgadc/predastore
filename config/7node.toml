# 7-node distributed cluster configuration.
#
# 7 database (Raft) + 7 storage (QUIC) nodes on loopback aliases.
# Each node N runs on 10.11.12.N — launch with: s3d -config clusters/7node/cluster.toml -node N
# Loopback aliases must be configured before use (see scripts/launch-cluster.sh).
#
# No buckets defined — tests and benchmarks create their own.

version = "1.0"
region = "ap-southeast-2"

