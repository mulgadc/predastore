# 5-node distributed cluster configuration.
#
# 5 database (Raft) + 5 storage (QUIC) nodes on loopback aliases.
# Each node N runs on 10.11.12.N — launch with: s3d -config clusters/5node/cluster.toml -node N
# Loopback aliases must be configured before use (see scripts/launch-cluster.sh).
#
# No buckets defined — tests and benchmarks create their own.

version = "1.0"
region = "ap-southeast-2"

host = "0.0.0.0"
port = 8443

[rs]
data = 3
parity = 2

